syntax = "proto3";

package xyz.fire_step.v1.seances;

option go_package = "github.com/aesterial/fire-step/backend/internal/api/xyz/fire-step/v1/seances;seances";
option csharp_namespace = "Aesterial.FireStep.Api.V1.Seances";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "xyz/fire-step/v1/seances/domain.proto";

message CreateSeanceRequest {
  repeated Action actions = 1;
  int32 errors = 2;
  google.protobuf.Timestamp at = 3;
  google.protobuf.Timestamp done = 4;
}

service SeancesService {
  rpc List(google.protobuf.Empty) returns (Seances);
  rpc Create(CreateSeanceRequest) returns (Seance);
}
