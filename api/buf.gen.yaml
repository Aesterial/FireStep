version: v2

inputs:
  - directory: .
    paths:
      - xyz/secureguard/v1

plugins:
  - local: protoc-gen-go
    out: ../backend/internal
    opt:
      - module=github.com/aesterial/fire-step/backend
  - local: protoc-gen-go-grpc
    out: ../backend/internal
    opt:
      - module=github.com/aesterial/fire-step/backend
      - require_unimplemented_servers=false