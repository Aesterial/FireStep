version: "2"
sql:
  - engine: "postgresql"
    schema: "./internal/migrations/scheme/scheme.sql"
    queries: "./internal/migrations/queries/queries.sql"
    gen:
      go:
        package: "sqlc"
        out: "./internal/infra/db/sqlc"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_empty_slices: true
        emit_json_tags: true
